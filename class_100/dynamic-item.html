<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery - ADD LIST</title>
</head>
<style>
    .remove{
        color: crimson;
    }

    li{
        margin-bottom: 10px;
    }
</style>
<body>

    <input type="text">
    <button class="add_list">Add Skill</button>
    <h4>Skills :</h4>
    <ul>

    </ul>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script>

    $("button").click(function(){
        let inputValue =  $("input").val();
        // console.log(inputValue);

        $("ul").append(`<li> ${inputValue} <button class='remove'>x</button></li>`);
        $("input").val("");

    });

    $("ul").on("click", ".remove", (e) => {
        // console.log(e.target.closest("li").remove());
        e.target.closest("li").remove();
    });

</script>  
</body>
</html>
